# Pre-commit hooks for TAVR Analytics
# Install: pip install pre-commit
# Setup: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^doc/.*\.ya?ml$
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: debug-statements
      - id: check-docstring-first
      - id: check-ast

  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3
        args: ['--line-length=120', '--skip-string-normalization']
        exclude: ^tavi_analytics/utils/slicer脚本调研/

  # Python import sorting
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile', 'black', '--line-length', '120']
        exclude: ^tavi_analytics/utils/slicer脚本调研/

  # Python linting
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [
          '--max-line-length=120',
          '--extend-ignore=E203,E266,E501,W503,E402',
          '--exclude=.git,__pycache__,.tox,.eggs,*.egg',
        ]
        exclude: ^tavi_analytics/utils/slicer脚本调研/

  # Python type checking (optional - may need adjustment for Slicer)
  # Uncomment if you want to use mypy
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.8.0
  #   hooks:
  #     - id: mypy
  #       args: [--ignore-missing-imports, --no-strict-optional]
  #       additional_dependencies: [types-all]
  #       exclude: ^(tests/|tavi_analytics/utils/slicer脚本调研/)

  # Python security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml', '-ll']
        additional_dependencies: ['bandit[toml]']
        exclude: ^tests/

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args: ['--fix']
        exclude: ^doc/.*\.md$

  # YAML formatting
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.12.0
    hooks:
      - id: pretty-format-yaml
        args: [--autofix, --indent, '2']
        exclude: ^doc/.*\.ya?ml$

# Configuration for specific hooks
exclude: |
  (?x)^(
    .*/__pycache__/.*|
    .*\.pyc$|
    .*\.egg-info/.*|
    .*/\.git/.*|
    build/.*|
    dist/.*|
    data/.*
  )$
